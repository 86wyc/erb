<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple GET Form Demo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        form { max-width: 400px; }
        label { display: block; margin: 10px 0 5px; }
        input { width: 100%; padding: 8px; margin-bottom: 15px; }
        button { padding: 10px 20px; background: #0066cc; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Student Demo: Form → GET Request → Express Backend</h1>
    
    <form action="/search" method="GET">
        <label for="name">Your Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>
        
        <label for="age">Your Age:</label>
        <input type="number" id="age" name="age" placeholder="Enter your age">
        
        <button type="submit">Submit (GET)</button>
    </form>

    <p><strong>Note:</strong> Watch the URL after submit. Data goes in query string (not body).</p>
</body>
</html>
